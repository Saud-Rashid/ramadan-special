<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You Queen ❤️</title>
    <style>
        :root {
            --bear-color: #8B5E3C;
            --bear-light: #E8C39E;
            --pink-blush: #FFB7C5;
            --border-color: #5D3E25;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        
        .bear-container {
            position: relative;
            width: 220px;
            height: 180px;
            margin: 0 auto -20px; 
            z-index: 2;
        }

        .bear-head {
            position: absolute;
            width: 180px;
            height: 150px;
            background: var(--bear-color);
            border-radius: 50% 50% 45% 45%;
            left: 20px;
            top: 20px;
            border: 4px solid var(--border-color);
        }

        .bear-ear {
            position: absolute;
            width: 55px;
            height: 55px;
            background: var(--bear-color);
            border: 4px solid var(--border-color);
            border-radius: 50%;
            top: 5px;
        }
        .bear-ear.left { left: 10px; }
        .bear-ear.right { right: 10px; }

        .bear-muzzle {
            position: absolute;
            width: 70px;
            height: 50px;
            background: var(--bear-light);
            border-radius: 50%;
            bottom: 15px;
            left: 55px;
            z-index: 2;
        }

       
        .bear-eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            top: 65px;
            z-index: 3;
        }
        .bear-eye.left { left: 45px; }
        .bear-eye.right { right: 45px; } 

        .bear-nose {
            position: absolute;
            width: 14px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            top: 10px;
            left: 28px;
        }

        .bear-mouth {
            position: absolute;
            width: 15px;
            height: 8px;
            border-bottom: 2px solid #333;
            border-radius: 0 0 10px 10px;
            top: 22px;
            left: 27px;
        }

        .bear-blush {
            position: absolute;
            width: 25px;
            height: 15px;
            background: var(--pink-blush);
            border-radius: 50%;
            top: 85px;
            opacity: 0.8;
        }
        .bear-blush.left { left: 25px; }
        .bear-blush.right { right: 25px; }

        .bear-paw {
            position: absolute;
            width: 45px;
            height: 50px;
            background: var(--bear-color);
            border: 4px solid var(--border-color);
            border-radius: 50%;
            bottom: -15px;
            z-index: 5;
        }
        .bear-paw.left { left: 35px; transform: rotate(10deg); }
        .bear-paw.right { right: 35px; transform: rotate(-10deg); }

        /* --- CARD DESIGN --- */
        .card {
            background: white;
            width: 350px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid #f8bbd0;
            position: relative;
            z-index: 1;
        }

        h1 { color: #d81b60; font-size: 24px; margin-top: 20px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; height: 50px; }
        button { padding: 10px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }

        #yes-btn { background-color: #ff4081; color: white; }
        #no-btn { background-color: #bdbdbd; color: white; position: relative; }

        #secret-letter { display: none; animation: openLetter 0.5s ease; }
        @keyframes openLetter { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .letter-content { background: #fff9fa; padding: 15px; border: 2px dashed #ff4081; border-radius: 10px; line-height: 1.6; color: #444; }

        .stars { position: absolute; top: -20px; width: 100%; text-align: center; font-size: 20px; color: #ffd700; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div>
        <div class="bear-container">
            <div class="stars">✨ ✨ ✨</div>
            <div class="bear-ear left"></div>
            <div class="bear-ear right"></div>
            <div class="bear-head">
                <div class="bear-eye left"></div>
                <div class="bear-eye right"></div>
                <div class="bear-blush left"></div>
                <div class="bear-blush right"></div>
                <div class="bear-muzzle">
                    <div class="bear-nose"></div>
                    <div class="bear-mouth"></div>
                </div>
            </div>
            <div class="bear-paw left"></div>
            <div class="bear-paw right"></div>
        </div>

        <div class="card" id="card-box">
            <div id="ask-section">
                <h1>Do You LIKE ME? ❤️</h1>
                <div class="btn-container">
                    <button id="yes-btn" onclick="openLetter()">YES</button>
                    <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">NO</button>
                </div>
            </div>

            <div id="secret-letter">
                <div class="letter-content">
                    <h3>Thank You! 🥰</h3>
                    <p>আমি জানতাম তুমি 'হ্যাঁ'-ই বলবে! তুমি পাশে থাকলে আমার দিনটা অনেক বেশি সুন্দর হয়ে যায়।</p>
                    <p>পুরো দিনের সবথেকে best মেমোরি তুমি..</p>
                    <p>একটা কথা কি জানো!!</p>
                     <p>লিখলে শব্দ তুমি,</p>
                     <p>চিন্তা করলে কল্পনা তুমি।।</p>
                     <p>চাইলে দুয়া তুমি,</p>
                     <p>সত্যিই বলতে ভালোবাসা তুমি।। </p>
                    <p><b>— তোমার ভূত</b></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function moveNo() {
            const btn = document.getElementById('no-btn');
            btn.style.position = 'fixed';
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function openLetter() {
            document.getElementById('ask-section').style.display = 'none';
            document.getElementById('secret-letter').style.display = 'block';
            document.querySelector('.stars').innerHTML = "💖 💖 💖";
        }
    </script>
</body>
</html>
