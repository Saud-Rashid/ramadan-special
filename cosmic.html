<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Peace 🌌</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* Deep Space Gradient Background */
            background: radial-gradient(circle at center, #050b18 0%, #000205 100%);
            overflow: hidden; touch-action: none;
        }

        #canvas {
            position: absolute; top: 0; left: 0;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        // Aesthetic Spiritual Color Palette
        const colors = [
            '#FFD700', // Gold
            '#FFFFFF', // Pure White
            '#AEEEEE', // Pale Turquoise
            '#E6E6FA', // Lavender
            '#FFB6C1', // Light Pink
            '#87CEEB'  // Sky Blue
        ];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Static background stars for depth
        const staticStars = [];
        for (let i = 0; i < 100; i++) {
            staticStars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5,
                opacity: Math.random() * 0.5
            });
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // Random size for the "dust" feel
                this.size = Math.random() * 2.5 + 0.5;
                // Random movement to create the "jholkani" or shimmer nearby
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = 1;
                this.flicker = Math.random() * 0.2; // Speed of sparkling
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Add a bit of drift downwards like stardust
                this.speedY += 0.01;

                if (this.opacity > 0.01) this.opacity -= 0.008;
            }

            draw() {
                // The "Jholkani" Effect: Shimmering brightness
                let s = this.size * (Math.sin(Date.now() * 0.01 + this.x) * 0.3 + 1);
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 12; // Glow effect
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawBackground() {
            // Draw faint static stars
            ctx.fillStyle = "white";
            staticStars.forEach(star => {
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0.01) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        function createParticles(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : null);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : null);
            
            if (x === null || y === null) return;

            // Generate burst of particles
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            // Trail effect: clears background but leaves a faint trace
            ctx.fillStyle = 'rgba(0, 1, 5, 0.15)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            handleParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            init();
            // Re-generate static stars on resize
            staticStars.length = 0;
            for (let i = 0; i < 100; i++) {
                staticStars.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 1.5, opacity: Math.random() * 0.5
                });
            }
        });

        window.addEventListener('mousemove', createParticles);
        window.addEventListener('touchmove', (e) => {
            // e.preventDefault(); // Removes pull-to-refresh
            createParticles(e);
        }, { passive: false });

        init();
        animate();
    </script>
</body>
</html>
