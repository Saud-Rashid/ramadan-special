<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Moon Revelation 🌙</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Amiri:ital@1&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        /* Pro UI Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            border: 1px solid rgba(0, 255, 204, 0.1);
            box-sizing: border-box;
        }

        .system-status {
            position: absolute; top: 30px; left: 30px;
            color: #00ffcc; font-size: 10px; letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .joy-meter {
            position: absolute; bottom: 40px; right: 30px;
            text-align: right; color: #ffd700;
        }

        .msg-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            opacity: 0; transition: 3s ease;
        }

        .eid-wish { font-family: 'Amiri', serif; font-size: 3rem; color: #ffd700; margin: 0; }
        .crush-name { font-size: 1rem; color: #fff; letter-spacing: 5px; text-transform: uppercase; }

        .hint {
            position: fixed; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 10px; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="system-status">
            [ SYSTEM: STABLE ]<br>
            [ FREQUENCY: SHAWWAL_01 ]<br>
            [ TARGET: MISS_PERFECT_KONGKUU ]
        </div>
        <div class="joy-meter">
            <div style="font-size: 8px; opacity: 0.6;">JOY PROBABILITY</div>
            <div id="percent" style="font-size: 24px;">99.9%</div>
        </div>
    </div>

    <div class="msg-container" id="finalMsg">
        <h1 class="eid-wish">Eid Mubarak</h1>
        <div class="crush-name">Dalia Nawshin Kongkuu</div>
        <p style="font-size: 12px; margin-top: 20px; opacity: 0.7;">কিছু পূর্ণতা আকাশের চাঁদে নয়, তোমার হাসিতে থাকে।</p>
    </div>

    <div class="hint" id="hint">HOLD SCREEN TO ALIGN CELESTIAL CORE</div>

    <script>
        let scene, camera, renderer, points;
        const PARTICLE_COUNT = 15000;
        let positions = [], targetPositions = [];
        let morphing = false;
        let mouse = new THREE.Vector2();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            
            // ১. শুরুর র‍্যান্ডম পজিশন (Stardust)
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                positions.push((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15);
                // ২. টার্গেট পজিশন (চাঁদ এর শেপ - Parametric Equation)
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                // এই লজিকটি একটি ক্রিসেন্ট মুন শেপ তৈরি করবে
                const r = 2;
                let tx = r * Math.sin(theta) * Math.cos(phi);
                let ty = r * Math.sin(theta) * Math.sin(phi);
                let tz = r * Math.cos(theta);
                
                // ক্রিসেন্ট কাটিং
                if (tx < -0.5) tx += 1.5; 
                
                targetPositions.push(tx, ty, tz);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 0.015,
                color: 0x00ffff,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', () => startMorph());
            window.addEventListener('mouseup', () => stopMorph());
            window.addEventListener('touchstart', (e) => { e.preventDefault(); startMorph(); });
            window.addEventListener('touchend', () => stopMorph());
            
            animate();
        }

        function startMorph() {
            morphing = true;
            document.getElementById('hint').style.opacity = '0';
            points.material.color.setHex(0xffd700); // সোনালী রঙ
        }

        function stopMorph() {
            morphing = false;
            document.getElementById('finalMsg').style.opacity = '0';
            points.material.color.setHex(0x00ffff); // সায়ান রঙ
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const posAttr = points.geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                const target = morphing ? targetPositions[i] : positions[i];
                posAttr.array[i] += (target - posAttr.array[i]) * 0.05;
            }
            posAttr.needsUpdate = true;

            points.rotation.y += 0.002;
            points.rotation.x += 0.001;

            if (morphing) {
                // চাঁদ তৈরি হয়ে গেলে মেসেজ দেখাও
                if(Math.abs(posAttr.array[0] - targetPositions[0]) < 0.1) {
                    document.getElementById('finalMsg').style.opacity = '1';
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
