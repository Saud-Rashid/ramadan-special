<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehri Magic 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #02040a; font-family: 'Poppins', sans-serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* Stars Background */
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; transition: 2s; }

        /* Lantern Container - Swaying Animation */
        .lantern-container {
            position: relative; z-index: 10; cursor: pointer;
            animation: sway 4s ease-in-out infinite;
            transform-origin: top center;
            top: -50px;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .lantern-svg {
            width: 220px; height: auto;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transition: 1.5s all ease-in-out;
        }

        /* Glass Panels Animation */
        .glass { opacity: 0.1; transition: 1.5s; }
        .lantern-svg.lit .glass-blue { fill: #00d4ff; opacity: 0.9; filter: drop-shadow(0 0 15px #00d4ff); }
        .lantern-svg.lit .glass-red { fill: #ff2e2e; opacity: 0.9; filter: drop-shadow(0 0 15px #ff2e2e); }
        .lantern-svg.lit .glass-gold { fill: #ffcc00; opacity: 0.9; filter: drop-shadow(0 0 25px #ffcc00); }
        .lantern-svg.lit .glass-purple { fill: #bd00ff; opacity: 0.9; filter: drop-shadow(0 0 15px #bd00ff); }
        
        /* Gold Frame Glow */
        .frame { fill: #332b00; transition: 1.5s; }
        .lantern-svg.lit .frame { fill: url(#goldGradient); filter: drop-shadow(0 0 5px #ffd700); }

        .instruction {
            color: #444; margin-top: 40px; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 3px;
            text-align: center; position: absolute; width: 100%; bottom: -60px;
        }

        /* The Secret Note */
        .note {
            position: absolute; bottom: -100%; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 400px;
            background: linear-gradient(145deg, #fff9e6, #ffffff);
            padding: 35px 25px; border-radius: 30px;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.8);
            transition: 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20; text-align: center;
            border: 2px solid #ffd700;
        }
        .note.show { bottom: 10%; }

        h2 { font-family: 'Amiri', serif; color: #8a6d3b; margin: 0; font-size: 2rem; }
        p { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: #333; margin: 20px 0; line-height: 1.6; }
    </style>
</head>
<body onclick="lightLantern()">

    <div id="stars"></div>

    <div class="lantern-container" id="mainObj">
        <svg class="lantern-svg" id="lantern" viewBox="0 0 200 320">
            <defs>
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#bf953f" />
                    <stop offset="25%" style="stop-color:#fcf6ba" />
                    <stop offset="50%" style="stop-color:#b38728" />
                    <stop offset="75%" style="stop-color:#fcf6ba" />
                    <stop offset="100%" style="stop-color:#aa771c" />
                </linearGradient>
            </defs>

            <!-- Hanging Chain -->
            <rect x="98" y="0" width="4" height="40" fill="#444" class="frame"/>
            
            <!-- Top Dome -->
            <path class="frame" d="M100 40 C60 40 50 80 50 80 L150 80 C150 80 140 40 100 40Z" />
            <path class="frame" d="M45 80 H155 V95 H45 Z" />

            <!-- Main Body Panels (Colored Glass) -->
            <!-- Left Panel -->
            <path class="glass glass-blue" d="M50 95 L30 220 L75 220 L75 95 Z" />
            <!-- Middle Panel -->
            <path class="glass glass-gold" d="M75 95 L75 220 L125 220 L125 95 Z" />
            <!-- Right Panel -->
            <path class="glass glass-red" d="M125 95 L125 220 L170 220 L150 95 Z" />

            <!-- Decorative Gold Frame / Grid -->
            <path class="frame" d="M50 95 L30 220 L170 220 L150 95 Z" fill="none" stroke-width="6" stroke="#222"/>
            <line class="frame" x1="75" y1="95" x2="75" y2="220" stroke="#222" stroke-width="4"/>
            <line class="frame" x1="125" y1="95" x2="125" y2="220" stroke="#222" stroke-width="4"/>
            
            <!-- Ornate Details (Jali) -->
            <circle class="frame" cx="100" cy="130" r="15" stroke="#222" stroke-width="2" fill="none" opacity="0.5"/>
            <circle class="frame" cx="100" cy="180" r="15" stroke="#222" stroke-width="2" fill="none" opacity="0.5"/>

            <!-- Bottom Cap -->
            <path class="frame" d="M30 220 L170 220 L150 250 L50 250 Z" />
            <path class="frame" d="M100 300 L70 250 L130 250 Z" />
            <circle class="frame" cx="100" cy="310" r="8" />
        </svg>
        <div class="instruction" id="hint">ফানুসটি জ্বালিয়ে সেহরি শেষ করো...</div>
    </div>

    <div class="note" id="note">
        <h2>Dalia Nawshin Kongkon ✨</h2>
        <p>
            "এই নিঝুম রাতে যখন আকাশভরা তারা, <br>
            তখন আমার প্রতিটি মোনাজাতে শুধু তোমার নাম। <br>
            আল্লাহ তোমার সেহরি ও রোজা কবুল করুন।"
        </p>
        <div style="font-size: 0.8rem; color: #aaa; border-top: 1px solid #eee; padding-top: 15px;">
            🌙 সেহরি মোবারক! সবসময় হাসিখুশি থেকো।
        </div>
    </div>

    <script>
        // Stars Logic
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        let activated = false;
        function lightLantern() {
            if(activated) return;
            activated = true;

            document.getElementById('lantern').classList.add('lit');
            document.getElementById('hint').style.opacity = '0';
            document.body.style.background = "radial-gradient(circle, #1a1000 0%, #02040a 100%)";

            // Stars fade in
            document.querySelectorAll('.star').forEach(s => s.style.opacity = Math.random());

            setTimeout(() => {
                document.getElementById('note').classList.add('show');
                document.getElementById('mainObj').style.transform = 'translateY(-130px) scale(0.8)';
            }, 1000);
        }
    </script>
</body>
</html>
